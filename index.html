<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Jarvis</title>
<meta name="theme-color" content="#17171B">
<script>
/* Decide AVANT le premier rendu : si un code est connu, on n'affiche JAMAIS l'ecran de connexion */
(function(){
  var has = false;
  try { has = !!localStorage.getItem('jarvisCode'); } catch(e){}
  if (!has) has = /[?&#]c=/.test(location.search + location.hash);
  if (has) document.documentElement.classList.add('boot');
})();
</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jarvis">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-512.png">
<link rel="icon" type="image/png" href="./icon-512.png">
<style>
  :root{
    --bg:#000000; --surface:#1C1C1E; --bubble:#26262A;
    --hairline:rgba(84,84,88,.65); --ink:#FFFFFF; --muted:#98989E;
    --blue:#0A84FF; --gold-a:#E8B96A; --gold-b:#B87E2E;
    --ok:#30D158; --no:#FF453A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%; height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
    position:fixed; inset:0;
    touch-action:manipulation; overscroll-behavior:none;
  }
  button{touch-action:manipulation; font-family:inherit}
  /* ---------- Login ---------- */
  #login{
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:20px; padding:24px; text-align:center;
    padding-top:calc(24px + env(safe-area-inset-top));
  }
  .biglogo{
    width:96px; height:96px; border-radius:50%;
    background:linear-gradient(145deg,var(--gold-a),var(--gold-b));
    color:#1A130A; font-weight:800; font-size:48px;
    display:flex; align-items:center; justify-content:center;
    font-family:Georgia,serif;
  }
  #login h1{font-size:34px; font-weight:700; margin:0; letter-spacing:.01em}
  #login p{color:var(--muted); font-size:16px; margin:0; max-width:34ch}
  #codein{
    font:inherit; font-size:18px; text-align:center; letter-spacing:.04em;
    background:var(--surface); border:0.5px solid var(--hairline); color:var(--ink);
    border-radius:12px; padding:15px 18px; width:min(340px,88vw);
    text-transform:lowercase;
  }
  #codein:focus{outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(10,132,255,.3)}
  #loginbtn{
    font:inherit; font-size:17px; font-weight:600; cursor:pointer;
    background:var(--blue); color:#fff;
    border:none; border-radius:12px; padding:15px 20px; width:min(340px,88vw);
  }
  #loginbtn:active{opacity:.75}
  #loginbtn:disabled{opacity:.5}
  #loginerr{color:var(--no); font-size:15px; min-height:22px; margin:0}
  .hint{
    color:var(--muted); font-size:13px; max-width:42ch; line-height:1.5;
    border-top:0.5px solid var(--hairline); padding-top:16px; margin-top:6px;
  }
  /* ---------- Chat ---------- */
  #app{flex:1; display:none; flex-direction:column; min-height:0}
  header{
    display:flex; flex-direction:row; justify-content:center; align-items:center; gap:8px;
    padding:calc(6px + env(safe-area-inset-top)) 16px 7px; flex:0 0 auto;
    background:rgba(22,22,24,.85);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    backdrop-filter:saturate(180%) blur(20px);
    border-bottom:0.5px solid var(--hairline);
    cursor:pointer; user-select:none; -webkit-user-select:none;
  }
  header:active{opacity:.8}
  .mono-j{
    box-shadow:0 1px 8px rgba(232,185,106,.4);
    width:26px; height:26px; border-radius:50%;
    background:linear-gradient(145deg,var(--gold-a),var(--gold-b));
    color:#1A130A; font-weight:800; font-size:13px;
    display:flex; align-items:center; justify-content:center;
    font-family:Georgia,serif; flex:0 0 auto;
  }
  .hname{font-size:14px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; padding-left:.2em}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--ok)}
  #chat{
    flex:1; overflow-y:auto; padding:16px 14px 10px;
    display:flex; flex-direction:column; gap:8px;
    -webkit-overflow-scrolling:touch;
    background:var(--bg);
  }
  #pullspin{
    flex:0 0 auto; height:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    background:var(--surface);
  }
  #pullspin.on{height:44px}
  .pullspin-ic{
    width:24px; height:24px; border-radius:50%;
    border:3px solid rgba(232,185,106,.25); border-top-color:var(--gold-a);
    animation:pullspin .7s linear infinite;
  }
  @keyframes pullspin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){.pullspin-ic{animation:none}}
  .msg{
    max-width:78%; padding:10px 15px; border-radius:20px;
    font-size:17px; line-height:1.35; white-space:pre-wrap; word-wrap:break-word;
  }
  .msg.user{align-self:flex-end; background:var(--blue); color:#fff; border-bottom-right-radius:6px}
  .msg.jarvis{align-self:flex-start; background:var(--bubble); color:var(--ink); border-bottom-left-radius:6px}
  .msg.err{align-self:center; background:none; border:0.5px dashed var(--no); color:var(--no); font-size:14px; max-width:94%; border-radius:12px}
  .msg.info{align-self:center; background:none; border:0.5px dashed var(--hairline); color:var(--muted); font-size:13.5px; max-width:94%; border-radius:12px}
  .typing{align-self:flex-start; display:flex; gap:5px; padding:14px 16px; background:var(--bubble); border-radius:20px; border-bottom-left-radius:6px}
  .typing i{width:8px; height:8px; border-radius:50%; background:var(--muted); animation:tp 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}
  .typing i:nth-child(3){animation-delay:.4s}
  @keyframes tp{0%,60%,100%{opacity:.25}30%{opacity:1}}
  @media (prefers-reduced-motion: reduce){.typing i{animation:none; opacity:.6}}
  /* ---------- Composer ---------- */
  #composer{
    display:flex; align-items:flex-end; gap:9px; flex:0 0 auto;
    padding:8px 12px max(8px, calc(env(safe-area-inset-bottom) - 6px));
    background:#17171B;
    border-top:0.5px solid var(--hairline);
  }
  #micbtn{
    width:40px; height:40px; border-radius:50%; flex:0 0 auto; cursor:pointer;
    border:none; background:var(--surface); color:var(--muted);
    display:none; align-items:center; justify-content:center;
    margin-bottom:2px;
  }
  #micbtn.on{display:flex}
  #micbtn.rec{background:var(--no); color:#fff; animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,69,58,.5)}60%{box-shadow:0 0 0 12px rgba(255,69,58,0)}}
  @media (prefers-reduced-motion: reduce){#micbtn.rec{animation:none}}
  #textin{
    flex:1; min-width:0; font:inherit; font-size:17px; resize:none;
    background:var(--surface); border:0.5px solid var(--hairline); color:var(--ink);
    border-radius:20px; padding:10px 16px; max-height:120px; line-height:1.35;
  }
  #textin::placeholder{color:var(--muted)}
  #textin:focus{outline:none; border-color:rgba(10,132,255,.7)}
  #sendbtn{
    width:40px; height:40px; border-radius:50%; flex:0 0 auto; cursor:pointer;
    border:none; background:var(--blue); color:#fff;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:2px;
    transition:opacity .12s ease, transform .12s ease;
  }
  #sendbtn:active{transform:scale(.9)}
  #sendbtn.idle{opacity:.4}
  @media (prefers-reduced-motion: reduce){#sendbtn{transition:none}}
  /* Enregistrement : onde sonore en direct */
  #recui{display:none; flex:1; align-items:center; gap:10px; min-height:44px}
  #recui canvas{flex:1; height:34px; min-width:0}
  .recdot{width:9px; height:9px; border-radius:50%; background:var(--no); animation:blink 1s infinite; flex:0 0 auto}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  @media (prefers-reduced-motion: reduce){.recdot{animation:none}}
  #rectime2{font-size:15px; font-variant-numeric:tabular-nums; color:var(--no); font-weight:600}
  #composer.recording #textin,#composer.recording #sendbtn{display:none}
  #composer.recording #recui{display:flex}
  /* Aperçu du vocal avant envoi (comme iMessage) */
  #prevui{display:none; flex:1; align-items:center; gap:9px; min-height:44px}
  #composer.preview #micbtn,#composer.preview #textin,#composer.preview #sendbtn{display:none}
  #composer.preview #prevui{display:flex}
  #prevui .pill{flex:1; display:flex; align-items:center; gap:9px; background:var(--blue); border-radius:22px; padding:8px 13px; min-width:0}
  #prevui .pill canvas{flex:1; height:26px; min-width:0}
  #pvplay{width:28px; height:28px; border-radius:50%; border:none; cursor:pointer; background:rgba(255,255,255,.28); color:#fff; font-size:11px; flex:0 0 auto; display:flex; align-items:center; justify-content:center}
  #pvtime{font-size:12.5px; color:#fff; font-variant-numeric:tabular-nums}
  #pvx{width:34px; height:34px; border-radius:50%; border:none; cursor:pointer; background:var(--surface); color:var(--muted); font-size:15px; flex:0 0 auto}
  #pvsend{width:40px; height:40px; border-radius:50%; border:none; cursor:pointer; background:var(--blue); color:#fff; display:flex; align-items:center; justify-content:center; flex:0 0 auto}
  /* Bulle vocal re-ecoutable */
  .msg.voice{min-width:215px}
  .vrow{display:flex; align-items:center; gap:10px}
  .vplay{width:34px; height:34px; border-radius:50%; border:none; cursor:pointer; background:rgba(255,255,255,.28); color:#fff; font-size:13px; display:flex; align-items:center; justify-content:center; flex:0 0 auto}
  .vrow canvas{flex:1; height:30px; min-width:110px}
  .vtime{font-size:12.5px; opacity:.9; font-variant-numeric:tabular-nums}
  .vtxt{font-size:15px; opacity:.95; margin-top:7px}
  /* Feuille menu (appui sur l'en-tete) */
  #sheetbg{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:40}
  #sheetbg.open{display:block}
  #sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:41;
    background:#1C1C1E; border-radius:16px 16px 0 0;
    padding:8px 16px calc(16px + env(safe-area-inset-bottom));
    transform:translateY(105%); transition:transform .28s cubic-bezier(.2,.9,.25,1);
  }
  #sheet.open{transform:translateY(0)}
  @media (prefers-reduced-motion: reduce){#sheet{transition:none}}
  .sh-handle{width:38px; height:5px; border-radius:3px; background:#3A3A3C; margin:4px auto 12px}
  .sh-item{
    display:flex; align-items:center; gap:12px; width:100%;
    font:inherit; font-size:17px; color:var(--ink); text-align:left;
    background:none; border:none; padding:14px 4px; cursor:pointer;
    border-top:0.5px solid rgba(84,84,88,.4);
  }
  .sh-item:first-of-type{border-top:none}
  .sh-item[disabled]{color:var(--muted)}
  .sh-item .soon{margin-left:auto; font-size:11px; color:var(--gold-a); border:1px solid rgba(232,185,106,.4); border-radius:99px; padding:2px 8px}
  .sh-item.danger{color:var(--no)}
  .sh-ver{text-align:center; color:var(--muted); font-size:12px; margin:10px 0 0}
  /* Horodatage discret sous chaque bulle */
  .mtime{display:block; font-size:10.5px; opacity:.5; margin-top:3px; line-height:1}
  .msg.user .mtime{text-align:right}
  .msg.jarvis .mtime{text-align:left}
  /* Feuille d'actions sur un message (copier/supprimer) */
  #msgSheetbg{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:50}
  #msgSheetbg.open{display:block}
  #msgSheet{
    position:fixed; left:0; right:0; bottom:0; z-index:51;
    background:#1C1C1E; border-radius:16px 16px 0 0;
    padding:8px 16px calc(16px + env(safe-area-inset-bottom));
    transform:translateY(105%); transition:transform .28s cubic-bezier(.2,.9,.25,1);
  }
  #msgSheet.open{transform:translateY(0)}
  @media (prefers-reduced-motion: reduce){#msgSheet{transition:none}}
  /* Toast (confirmation copie) */
  #toast{
    position:fixed; left:50%; bottom:max(90px, calc(90px + env(safe-area-inset-bottom)));
    transform:translate(-50%,10px); background:rgba(40,40,42,.95); color:#fff;
    font-size:13.5px; padding:9px 16px; border-radius:99px; z-index:60;
    opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;
  }
  #toast.on{opacity:1; transform:translate(-50%,0)}
  @media (prefers-reduced-motion: reduce){#toast{transition:none}}
  /* Cartes de validation (brouillons email, rendez-vous...) */
  .vcard{max-width:88%}
  .vc-resume{white-space:pre-wrap; font-size:15px; line-height:1.45; background:rgba(255,255,255,.07); border-radius:12px; padding:10px 12px; margin-bottom:10px; word-wrap:break-word}
  .vc-row{display:flex; gap:8px}
  .vc-ok,.vc-no{flex:1; font:inherit; font-size:16px; font-weight:600; padding:12px; border-radius:12px; border:none; cursor:pointer}
  .vc-ok{background:#30D158; color:#03240F}
  .vc-no{background:rgba(255,69,58,.15); color:#FF453A; border:0.5px solid rgba(255,69,58,.5)}
  .vc-ok:disabled,.vc-no:disabled{opacity:.45}
  .vc-edit{
    display:block; width:100%; font:inherit; font-size:14.5px; font-weight:600;
    padding:10px; border-radius:12px; margin-bottom:8px; cursor:pointer;
    background:none; border:0.5px solid var(--hairline); color:var(--muted);
  }
  .vc-edit:disabled{opacity:.4}
  a.vc-attach{
    display:flex; align-items:center; gap:8px; text-decoration:none;
    background:rgba(255,255,255,.07); border:0.5px solid var(--hairline);
    border-radius:12px; padding:9px 12px; margin-bottom:10px; cursor:pointer;
  }
  .vc-attach .vc-attach-ic{font-size:18px}
  .vc-attach .vc-attach-txt{flex:1; min-width:0}
  .vc-attach b{display:block; font-size:14.5px; color:var(--ink); font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .vc-attach span{display:block; font-size:12px; color:var(--muted); margin-top:1px}
  a.fbtn{display:block; text-decoration:none; align-self:flex-start; cursor:pointer}
  .fbtn b{display:block; font-size:15.5px; color:var(--ink); font-weight:600}
  .fbtn span{display:block; font-size:12.5px; color:var(--muted); margin-top:3px}
  /* ---------- Écran de lancement ---------- */
  #splash{
    position:fixed; inset:0; z-index:60; background:var(--bg);
    display:none; align-items:center; justify-content:center; flex-direction:column; gap:30px;
    transition:opacity .3s ease;
  }
  #splash.on{display:flex}
  html.boot #login{display:none}
  html.boot #splash{display:flex}
  #splash.done{opacity:0; pointer-events:none}
  .s-wrap{position:relative; width:118px; height:118px; animation:senter .6s cubic-bezier(.2,.9,.3,1.3) both}
  @keyframes senter{from{transform:scale(.55); opacity:0}to{transform:scale(1); opacity:1}}
  .s-ring{
    position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from 0deg, transparent 0 62%, rgba(232,185,106,.15) 72%, #E8B96A 88%, #F5D9A0 96%, transparent 100%);
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 3.5px), #fff calc(100% - 3px));
    mask:radial-gradient(farthest-side, transparent calc(100% - 3.5px), #fff calc(100% - 3px));
    animation:sring 1.15s linear infinite;
  }
  @keyframes sring{to{transform:rotate(360deg)}}
  .s-logo{
    position:absolute; inset:13px; border-radius:50%;
    background:linear-gradient(145deg,#E8B96A,#B87E2E); color:#1A130A;
    font-family:Georgia,serif; font-weight:800; font-size:46px;
    display:flex; align-items:center; justify-content:center;
    animation:sbreathe 2.2s ease-in-out infinite;
  }
  @keyframes sbreathe{0%,100%{box-shadow:0 0 22px rgba(232,185,106,.22)}50%{box-shadow:0 0 58px rgba(232,185,106,.55)}}
  #splash .s-name{color:var(--muted); font-size:13px; font-weight:700; letter-spacing:.34em; text-transform:uppercase; padding-left:.34em}
  @media (prefers-reduced-motion: reduce){
    .s-ring{animation:none; opacity:.4}
    .s-logo{animation:none}
    .s-wrap{animation:none}
  }
</style>
</head>
<body>

<div id="splash">
  <div class="s-wrap"><div class="s-ring"></div><div class="s-logo">J</div></div>
  <div class="s-name">Jarvis</div>
</div>

<div id="login">
  <div class="biglogo">J</div>
  <h1>Jarvis</h1>
  <p>Votre assistant, disponible 24h/24.</p>
  <input id="codein" type="text" placeholder="Code d'accès" autocomplete="off" autocapitalize="none">
  <button id="loginbtn" type="button">Se connecter</button>
  <p id="loginerr"></p>
  <p class="hint">Une fois connecté : Partager → « Sur l'écran d'accueil ». Jarvis s'installe comme une vraie application, avec votre code retenu dans le raccourci.</p>
  <p class="hint" style="border:none; padding-top:0; margin-top:-8px">v2.17</p>
</div>

<div id="app">
  <header>
    <div class="mono-j">J</div>
    <b class="hname">Jarvis</b>
    <i class="dot"></i>
  </header>
  <div id="pullspin"><span class="pullspin-ic"></span></div>
  <div id="chat"></div>
  <div id="composer">
    <button id="micbtn" type="button" aria-label="Message vocal">
      <svg width="18" height="22" viewBox="0 0 22 26" fill="currentColor"><rect x="7" y="1" width="8" height="14" rx="4"/><path d="M3 12a8 8 0 0 0 16 0M11 20v4M7 24.5h8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div id="recui"><span class="recdot"></span><canvas id="reccv"></canvas><span id="rectime2">0:00</span></div>
    <div id="prevui">
      <button id="pvx" type="button" aria-label="Annuler">✕</button>
      <div class="pill"><button id="pvplay" type="button" aria-label="Écouter">▶</button><canvas id="pvcv"></canvas><span id="pvtime">0:00</span></div>
      <button id="pvsend" type="button" aria-label="Envoyer le vocal"><svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path d="M10 17V5.5M10 3l-6 6.2M10 3l6 6.2" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <textarea id="textin" rows="1" placeholder="Écrire à Jarvis…"></textarea>
    <button id="sendbtn" class="idle" type="button" aria-label="Envoyer">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path d="M10 17V5.5M10 3l-6 6.2M10 3l6 6.2" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<div id="sheetbg"></div>
<div id="sheet">
  <div class="sh-handle"></div>
  <button class="sh-item" id="sh-reload" type="button">🔄&nbsp; Recharger la conversation</button>
  <button class="sh-item" type="button" disabled>📞&nbsp; Appeler Jarvis <span class="soon">bientôt</span></button>
  <button class="sh-item" type="button" disabled>✉️&nbsp; Emails à valider <span class="soon">bientôt</span></button>
  <button class="sh-item" type="button" disabled>📄&nbsp; Mes documents <span class="soon">bientôt</span></button>
  <button class="sh-item" id="sh-push" type="button">🔔&nbsp; Activer les notifications</button>
  <button class="sh-item danger" id="sh-logout" type="button">Se déconnecter</button>
  <p class="sh-ver" id="subline">Jarvis · v2.11</p>
</div>

<div id="msgSheetbg"></div>
<div id="msgSheet">
  <div class="sh-handle"></div>
  <button class="sh-item" id="msgCopy" type="button">📋&nbsp; Copier le texte</button>
  <button class="sh-item danger" id="msgDelete" type="button">🗑&nbsp; Supprimer</button>
  <button class="sh-item" id="msgCancel" type="button">Annuler</button>
</div>
<div id="toast"></div>

<script>
(function(){
  var APPV = 'v2.17';

  // ---- Mise à jour automatique (contourne le cache GitHub Pages) ----
  function checkUpdate(){
    fetch('./version.json?t=' + Date.now(), { cache:'no-store' })
      .then(function(r){ return r.json(); })
      .then(function(j){
        if (!j || !j.v || ('v' + j.v) === APPV) return;
        var tried = null;
        try { tried = sessionStorage.getItem('majTentee'); } catch(e){}
        if (tried === j.v) return; // déjà tenté (nouvelle version en cours de propagation)
        try { sessionStorage.setItem('majTentee', j.v); } catch(e){}
        location.replace(location.pathname + '?u=' + Date.now());
      }).catch(function(){});
  }
  checkUpdate();
  setInterval(checkUpdate, 60000);
  document.addEventListener('visibilitychange', function(){ if (!document.hidden) checkUpdate(); });
  var API = 'https://mat22.app.n8n.cloud/webhook/jarvis-msg';
  var login = document.getElementById('login');
  var app = document.getElementById('app');
  var chat = document.getElementById('chat');
  var codein = document.getElementById('codein');
  var loginbtn = document.getElementById('loginbtn');
  var loginerr = document.getElementById('loginerr');
  var textin = document.getElementById('textin');
  var sendbtn = document.getElementById('sendbtn');
  var micbtn = document.getElementById('micbtn');
  var subline = document.getElementById('subline');

  function drawWave(cv, wave, progress, colPlayed, colRest){
    var w = cv.width = (cv.clientWidth || 160) * 2, h = cv.height = (cv.clientHeight || 30) * 2;

    var n = wave.length, bw = w / n;

  function condense(arr, n){
    if (!arr.length) return Array.apply(null, Array(n)).map(function(){ return .3; });
    var out = [], step = arr.length / n;
    for (var i = 0; i < n; i++){
      var a = Math.floor(i * step), b = Math.max(a + 1, Math.floor((i + 1) * step)), m = 0;
      for (var j = a; j < b && j < arr.length; j++) m = Math.max(m, arr[j]);

    if (!String(read('jarvisCode') || '').trim()) return;
    post({ type:'inbox' }, function(j){
      (j.messages || []).forEach(function(m){
        bubble(String(m.contenu || ''), 'jarvis');
      });
    }, function(){});
  }
  setInterval(pollInbox, 5000);

  // ---- Rafraîchit la conversation depuis le serveur (corrige : notification cliquée → discussion pas à jour) ----
  var refreshing = false;
  function refreshFromServer(force, done){
    if (refreshing){ if (done) done(); return; }
    if (app.style.display !== 'flex'){ if (done) done(); return; }
    if (!String(read('jarvisCode') || '').trim()){ if (done) done(); return; }
    refreshing = true;
    post({ type:'history' }, function(j){
      refreshing = false;
      if (j.nom) store('jarvisNom', j.nom);
      var frais = JSON.stringify({ nom: j.nom, messages: j.messages });
      var prevCached = null;
      try { prevCached = localStorage.getItem('jarvisHist'); } catch(e){}
      if (frais !== prevCached || force){
        renderHistory(j.messages, j);
        try { localStorage.setItem('jarvisHist', frais); } catch(e){}
      }
      if (done) done();
    }, function(){ refreshing = false; if (done) done(); });
  }
  function onResume(){ pollInbox(); refreshFromServer(); }
  document.addEventListener('visibilitychange', function(){ if (!document.hidden) onResume(); });
  window.addEventListener('focus', onResume);
  window.addEventListener('pageshow', function(e){ if (e.persisted) onResume(); });

  // ---- Tire vers le haut = petite roue + recharge la conversation depuis le serveur ----
  // ⚠️ Le simple evenement 'scroll' s'est revele peu fiable sur iOS (momentum scroll,
  // evenements pas toujours emis a la bonne position) -> geste tactile direct a la place
  // (touchstart/touchmove/touchend), le meme principe que les listes "tirer pour rafraichir".
  var pullspin = document.getElementById('pullspin');
  var pullCooldown = false;
  var pullStartY = null;
  var pullArmed = false;
  chat.addEventListener('touchstart', function(e){
    if (pullCooldown) return;
    if (chat.scrollTop > 2) { pullStartY = null; return; }
    pullStartY = e.touches[0].clientY;
    pullArmed = false;
  }, { passive:true });
  chat.addEventListener('touchmove', function(e){
    if (pullStartY === null || pullCooldown) return;
    var dy = e.touches[0].clientY - pullStartY;
    if (chat.scrollTop <= 2 && dy > 28){
      pullArmed = true;
      pullspin.classList.add('on');
    }
  }, { passive:true });
  function pullEnd(){
    pullStartY = null;
    if (!pullArmed) return;
    pullArmed = false;
    pullCooldown = true;
    var shownAt = Date.now();
    refreshFromServer(true, function(){
      // Reste visible au moins 700 ms (sinon un rechargement rapide fait clignoter la roue
      // trop vite pour etre remarquee).
      var reste = 700 - (Date.now() - shownAt);
      setTimeout(function(){
        pullspin.classList.remove('on');
        setTimeout(function(){ pullCooldown = false; }, 1200);
      }, Math.max(0, reste));
    });
  }
  chat.addEventListener('touchend', pullEnd, { passive:true });
  chat.addEventListener('touchcancel', pullEnd, { passive:true });

  // ---- Démarrage INSTANTANÉ : cache local d'abord, serveur en arrière-plan ----
  var splash = document.getElementById('splash');
  function splashOff(){
    splash.classList.add('done');
    setTimeout(function(){
      document.documentElement.classList.remove('boot');
      splash.classList.remove('on','done');
      splash.style.display = 'none';
    }, 320);
  }
  var savedCode = String(read('jarvisCode') || '').trim();
  if (savedCode){
    store('jarvisCode', savedCode);
    var cached = null;
    try { cached = JSON.parse(localStorage.getItem('jarvisHist') || 'null'); } catch(e){}
    if (cached && cached.messages && cached.messages.length){
      // Ouverture immédiate sur la dernière conversation connue (0 attente)
      enterApp(cached.nom || read('jarvisNom'), cached.messages);
      splashOff();
    } else {
      splash.classList.add('on');
    }
    post({ type:'history' }, function(j){
      if (j.nom) store('jarvisNom', j.nom);
      var frais = JSON.stringify({ nom: j.nom, messages: j.messages });
      if (!cached || frais !== JSON.stringify(cached)){
        enterApp(j.nom || read('jarvisNom'), j.messages, j);
      } else {
        renderExtras(j);
      }
      try { localStorage.setItem('jarvisHist', frais); } catch(e){}
      splashOff();
    }, function(){
      // code périmé ou réseau coupé : sans cache, retour à l'écran de connexion
      if (!(cached && cached.messages && cached.messages.length)){
        splash.classList.remove('on');
        document.documentElement.classList.remove('boot');
        splash.style.display = 'none';
        login.style.display = 'flex';
      }
    });
  }
})();
</script>
</body>
</html>
