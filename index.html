<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Jarvis</title>
<meta name="theme-color" content="#17171B">
<script>
/* Decide AVANT le premier rendu : si un code est connu, on n'affiche JAMAIS l'ecran de connexion */
(function(){
  var has = false;
  try { has = !!localStorage.getItem('jarvisCode'); } catch(e){}
  if (!has) has = /[?&#]c=/.test(location.search + location.hash);
  if (has) document.documentElement.classList.add('boot');
})();
</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jarvis">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-512.png">
<link rel="icon" type="image/png" href="./icon-512.png">
<style>
  :root{
    --bg:#000000; --surface:#1C1C1E; --bubble:#26262A;
    --hairline:rgba(84,84,88,.65); --ink:#FFFFFF; --muted:#98989E;
    --blue:#0A84FF; --gold-a:#E8B96A; --gold-b:#B87E2E;
    --ok:#30D158; --no:#FF453A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%; height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
    position:fixed; inset:0;
    touch-action:manipulation; overscroll-behavior:none;
  }
  button{touch-action:manipulation; font-family:inherit}
  /* ---------- Login ---------- */
  #login{
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:20px; padding:24px; text-align:center;
    padding-top:calc(24px + env(safe-area-inset-top));
  }
  .biglogo{
    width:96px; height:96px; border-radius:50%;
    background:linear-gradient(145deg,var(--gold-a),var(--gold-b));
    color:#1A130A; font-weight:800; font-size:48px;
    display:flex; align-items:center; justify-content:center;
    font-family:Georgia,serif;
  }
  #login h1{font-size:34px; font-weight:700; margin:0; letter-spacing:.01em}
  #login p{color:var(--muted); font-size:16px; margin:0; max-width:34ch}
  #codein{
    font:inherit; font-size:18px; text-align:center; letter-spacing:.04em;
    background:var(--surface); border:0.5px solid var(--hairline); color:var(--ink);
    border-radius:12px; padding:15px 18px; width:min(340px,88vw);
    text-transform:lowercase;
  }
  #codein:focus{outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(10,132,255,.3)}
  #loginbtn{
    font:inherit; font-size:17px; font-weight:600; cursor:pointer;
    background:var(--blue); color:#fff;
    border:none; border-radius:12px; padding:15px 20px; width:min(340px,88vw);
  }
  #loginbtn:active{opacity:.75}
  #loginbtn:disabled{opacity:.5}
  #loginerr{color:var(--no); font-size:15px; min-height:22px; margin:0}
  .hint{
    color:var(--muted); font-size:13px; max-width:42ch; line-height:1.5;
    border-top:0.5px solid var(--hairline); padding-top:16px; margin-top:6px;
  }
  /* ---------- Chat ---------- */
  #app{flex:1; display:none; flex-direction:column; min-height:0}
  header{
    position:relative;
    display:flex; flex-direction:row; justify-content:center; align-items:center; gap:8px;
    padding:calc(6px + env(safe-area-inset-top)) 16px 7px; flex:0 0 auto;
    background:rgba(22,22,24,.85);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    backdrop-filter:saturate(180%) blur(20px);
    border-bottom:0.5px solid var(--hairline);
    cursor:pointer; user-select:none; -webkit-user-select:none;
    transition:opacity .12s ease, transform .12s ease;
  }
  header:active{opacity:.72; transform:scale(.992)}
  #hchev{
    flex:0 0 auto; color:var(--gold-a); opacity:.85; margin-left:1px;
    transition:transform .32s cubic-bezier(.32,.72,0,1);
  }
  header.menu-open #hchev{transform:rotate(180deg)}
  #hcallbtn{
    margin-left:auto; flex:0 0 auto;
    width:44px; height:44px; border-radius:50%; border:0; padding:0;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(145deg,var(--gold-a),var(--gold-b));
    color:#1A130A; box-shadow:0 1px 8px rgba(232,185,106,.4);
    cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  #hcallbtn:active{opacity:.75}
  .mono-j{
    box-shadow:0 1px 8px rgba(232,185,106,.4);
    width:26px; height:26px; border-radius:50%;
    background:linear-gradient(145deg,var(--gold-a),var(--gold-b));
    color:#1A130A; font-weight:800; font-size:13px;
    display:flex; align-items:center; justify-content:center;
    font-family:Georgia,serif; flex:0 0 auto;
  }
  .hname{font-size:14px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; padding-left:.2em}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--ok)}
  #chat{
    flex:1; overflow-y:auto; padding:16px 14px 10px;
    display:flex; flex-direction:column; gap:8px;
    -webkit-overflow-scrolling:touch;
    background:var(--bg);
  }
  #pullspin{
    flex:0 0 auto; height:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    background:var(--surface);
  }
  #pullspin.on{height:44px}
  .pullspin-ic{
    width:24px; height:24px; border-radius:50%;
    border:3px solid rgba(232,185,106,.25); border-top-color:var(--gold-a);
    animation:pullspin .7s linear infinite;
  }
  @keyframes pullspin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){.pullspin-ic{animation:none}}
  .msg{
    max-width:78%; padding:10px 15px; border-radius:20px;
    font-size:17px; line-height:1.35; white-space:pre-wrap; word-wrap:break-word;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
  }
  .msg.user{align-self:flex-end; background:var(--blue); color:#fff; border-bottom-right-radius:6px}
  .msg.jarvis{align-self:flex-start; background:var(--bubble); color:var(--ink); border-bottom-left-radius:6px}
  .msg.err{align-self:center; background:none; border:0.5px dashed var(--no); color:var(--no); font-size:14px; max-width:94%; border-radius:12px}
  .msg.info{align-self:center; background:none; border:0.5px dashed var(--hairline); color:var(--muted); font-size:13.5px; max-width:94%; border-radius:12px}
  .typing{align-self:flex-start; display:flex; gap:5px; padding:14px 16px; background:var(--bubble); border-radius:20px; border-bottom-left-radius:6px}
  .typing i{width:8px; height:8px; border-radius:50%; background:var(--muted); animation:tp 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}
  .typing i:nth-child(3){animation-delay:.4s}
  @keyframes tp{0%,60%,100%{opacity:.25}30%{opacity:1}}
  @media (prefers-reduced-motion: reduce){.typing i{animation:none; opacity:.6}}
  /* ---------- Composer ---------- */
  #composer{
    display:flex; align-items:flex-end; gap:9px; flex:0 0 auto;
    padding:8px 12px max(8px, calc(env(safe-area-inset-bottom) - 6px));
    background:#17171B;
    border-top:0.5px solid var(--hairline);
  }
  #micbtn{
    width:40px; height:40px; border-radius:50%; flex:0 0 auto; cursor:pointer;
    border:none; background:var(--surface); color:var(--muted);
    display:none; align-items:center; justify-content:center;
    margin-bottom:2px;
  }
  #micbtn.on{display:flex}
  #micbtn.rec{background:var(--no); color:#fff; animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,69,58,.5)}60%{box-shadow:0 0 0 12px rgba(255,69,58,0)}}
  @media (prefers-reduced-motion: reduce){#micbtn.rec{animation:none}}
  #textin{
    flex:1; min-width:0; font:inherit; font-size:17px; resize:none;
    background:var(--surface); border:0.5px solid var(--hairline); color:var(--ink);
    border-radius:20px; padding:10px 16px; max-height:120px; line-height:1.35;
  }
  #textin::placeholder{color:var(--muted)}
  #textin:focus{outline:none; border-color:rgba(10,132,255,.7)}
  #sendbtn{
    width:40px; height:40px; border-radius:50%; flex:0 0 auto; cursor:pointer;
    border:none; background:var(--blue); color:#fff;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:2px;
    transition:opacity .12s ease, transform .12s ease;
  }
  #sendbtn:active{transform:scale(.9)}
  #sendbtn.idle{opacity:.4}
  @media (prefers-reduced-motion: reduce){#sendbtn{transition:none}}
  /* Enregistrement : onde sonore en direct */
  #recui{display:none; flex:1; align-items:center; gap:10px; min-height:44px}
  #recui canvas{flex:1; height:34px; min-width:0}
  .recdot{width:9px; height:9px; border-radius:50%; background:var(--no); animation:blink 1s infinite; flex:0 0 auto}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  @media (prefers-reduced-motion: reduce){.recdot{animation:none}}
  #rectime2{font-size:15px; font-variant-numeric:tabular-nums; color:var(--no); font-weight:600}
  #composer.recording #textin,#composer.recording #sendbtn{display:none}
  #composer.recording #recui{display:flex}
  /* Aperçu du vocal avant envoi (comme iMessage) */
  #prevui{display:none; flex:1; align-items:center; gap:9px; min-height:44px}
  #composer.preview #micbtn,#composer.preview #textin,#composer.preview #sendbtn{display:none}
  #composer.preview #prevui{display:flex}
  #prevui .pill{flex:1; display:flex; align-items:center; gap:9px; background:var(--blue); border-radius:22px; padding:8px 13px; min-width:0}
  #prevui .pill canvas{flex:1; height:26px; min-width:0}
  #pvplay{width:28px; height:28px; border-radius:50%; border:none; cursor:pointer; background:rgba(255,255,255,.28); color:#fff; font-size:11px; flex:0 0 auto; display:flex; align-items:center; justify-content:center}
  #pvtime{font-size:12.5px; color:#fff; font-variant-numeric:tabular-nums}
  #pvx{width:34px; height:34px; border-radius:50%; border:none; cursor:pointer; background:var(--surface); color:var(--muted); font-size:15px; flex:0 0 auto}
  #pvsend{width:40px; height:40px; border-radius:50%; border:none; cursor:pointer; background:var(--blue); color:#fff; display:flex; align-items:center; justify-content:center; flex:0 0 auto}
  /* Bulle vocal re-ecoutable */
  .msg.voice{min-width:215px}
  .vrow{display:flex; align-items:center; gap:10px}
  .vplay{width:34px; height:34px; border-radius:50%; border:none; cursor:pointer; background:rgba(255,255,255,.28); color:#fff; font-size:13px; display:flex; align-items:center; justify-content:center; flex:0 0 auto}
  .vrow canvas{flex:1; height:30px; min-width:110px}
  .vtime{font-size:12.5px; opacity:.9; font-variant-numeric:tabular-nums}
  .vtxt{font-size:15px; opacity:.95; margin-top:7px}
  /* Feuille menu (appui sur l'en-tete) — style "luxe" */
  #sheetbg{
    position:fixed; inset:0; background:rgba(0,0,0,0); display:none; z-index:40;
    transition:background .32s cubic-bezier(.32,.72,0,1);
    -webkit-backdrop-filter:blur(0px); backdrop-filter:blur(0px);
  }
  #sheetbg.open{display:block; background:rgba(0,0,0,.55); -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px)}
  #sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:41;
    background:linear-gradient(180deg,#232326,#19191C);
    border-radius:24px 24px 0 0;
    border:0.5px solid rgba(255,255,255,.08); border-bottom:none;
    box-shadow:0 -18px 50px rgba(0,0,0,.5), 0 -2px 0 rgba(255,255,255,.03) inset;
    padding:10px 14px calc(14px + env(safe-area-inset-bottom));
    transform:translateY(108%); transition:transform .38s cubic-bezier(.32,.72,0,1);
  }
  #sheet.open{transform:translateY(0)}
  @media (prefers-reduced-motion: reduce){#sheet{transition:none}#sheetbg{transition:none}}
  .sh-handle{width:36px; height:5px; border-radius:3px; background:rgba(255,255,255,.18); margin:6px auto 14px}
  .sh-group{background:rgba(255,255,255,.045); border-radius:16px; overflow:hidden; margin-bottom:10px}
  .sh-item{
    display:flex; align-items:center; gap:13px; width:100%;
    font:inherit; font-size:16px; font-weight:500; color:var(--ink); text-align:left;
    background:none; border:none; padding:13px 12px; cursor:pointer;
    border-top:0.5px solid rgba(255,255,255,.07);
    transition:background .12s ease;
  }
  .sh-item:first-child{border-top:none}
  .sh-item:active{background:rgba(255,255,255,.06)}
  .sh-item[disabled]{color:var(--muted)}
  .sh-item[disabled]:active{background:none}
  .sh-ic{
    flex:0 0 auto; width:32px; height:32px; border-radius:9.5px;
    background:rgba(232,185,106,.13); color:var(--gold-a);
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .sh-item.danger .sh-ic{background:rgba(255,69,58,.13)}
  .sh-label{flex:1; min-width:0}
  .sh-item .soon{margin-left:auto; flex:0 0 auto; font-size:11px; color:var(--gold-a); border:1px solid rgba(232,185,106,.4); border-radius:99px; padding:2px 8px}
  .sh-item.danger{color:var(--no)}
  .sw{
    margin-left:auto; flex:0 0 auto; width:48px; height:28px; border-radius:16px;
    background:rgba(120,120,128,.32); position:relative; transition:background .2s ease;
  }
  .sw.on{background:var(--ok)}
  .sw.busy{opacity:.5}
  .sw-knob{
    position:absolute; top:2px; left:2px; width:24px; height:24px; border-radius:50%;
    background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.4); transition:transform .2s cubic-bezier(.3,1,.4,1);
  }
  .sw.on .sw-knob{transform:translateX(20px)}
  .sh-ver{text-align:center; color:var(--muted); font-size:12px; margin:4px 0 0}
  /* Panneau plein ecran "Mes documents" */
  #docsview{
    position:fixed; inset:0; z-index:50; background:var(--bg);
    display:none; flex-direction:column;
    transform:translateY(100%); transition:transform .28s cubic-bezier(.2,.9,.25,1);
  }
  #docsview.open{display:flex; transform:translateY(0)}
  @media (prefers-reduced-motion: reduce){#docsview{transition:none}}
  #docs-head{
    flex:0 0 auto; display:flex; align-items:center; gap:10px;
    padding:calc(10px + env(safe-area-inset-top)) 14px 12px;
    border-bottom:0.5px solid var(--hairline);
  }
  #docs-head b{font-size:16px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  #docs-close, #docs-back{
    width:32px; height:32px; border-radius:50%; border:0; flex:0 0 auto;
    background:var(--surface); color:var(--ink); font-size:16px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  #docs-search-wrap{flex:0 0 auto; padding:2px 14px 10px}
  #docs-search{
    width:100%; box-sizing:border-box; border:none; border-radius:12px;
    background:var(--surface); color:var(--ink); font-size:15px; padding:10px 12px;
    -webkit-appearance:none;
  }
  #docs-search::placeholder{color:var(--muted)}
  #docs-list{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 14px calc(20px + env(safe-area-inset-bottom))}
  .doc-group-head{
    font-size:12.5px; font-weight:700; color:var(--gold-a); text-transform:uppercase; letter-spacing:.03em;
    padding:14px 4px 6px; position:sticky; top:0; background:var(--bg);
  }
  .doc-group-head:first-child{padding-top:6px}
  .doc-row{
    display:flex; align-items:center; gap:12px; width:100%;
    padding:12px 4px; border-top:0.5px solid rgba(84,84,88,.4);
    color:inherit; text-decoration:none; background:none; border-left:none; border-right:none;
  }
  .doc-row:first-child{border-top:none}
  .doc-emo{font-size:22px; flex:0 0 auto; width:28px; text-align:center}
  .doc-mid{flex:1; min-width:0}
  .doc-nom{font-size:15px; font-weight:600; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .doc-info{font-size:12.5px; color:var(--muted); display:block; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .doc-cat{font-size:11px; color:var(--gold-a); border:1px solid rgba(232,185,106,.4); border-radius:99px; padding:2px 8px; flex:0 0 auto}
  #docs-empty, #docs-loading{color:var(--muted); text-align:center; padding:40px 20px; font-size:14px}
  /* Dossiers (vue racine "Mes documents") */
  .doc-folder{
    display:flex; align-items:center; gap:12px; width:100%;
    padding:14px 4px; border-top:0.5px solid rgba(84,84,88,.4);
    color:inherit; text-decoration:none; background:none; border-left:none; border-right:none; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .doc-folder:first-child{border-top:none}
  .doc-folder-nom{flex:1; font-size:15.5px; font-weight:600}
  .doc-folder-count{font-size:13px; color:var(--muted); background:var(--surface); border-radius:99px; padding:2px 9px; flex:0 0 auto}
  .doc-folder-chev{font-size:18px; color:var(--muted); flex:0 0 auto}
  /* Horodatage discret sous chaque bulle */
  .mtime{display:block; font-size:10.5px; opacity:.5; margin-top:3px; line-height:1}
  .msg.user .mtime{text-align:right}
  .msg.jarvis .mtime{text-align:left}
  /* Feuille d'actions sur un message (copier/supprimer) */
  #msgSheetbg{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:50}
  #msgSheetbg.open{display:block}
  #msgSheet{
    position:fixed; left:0; right:0; bottom:0; z-index:51;
    background:#1C1C1E; border-radius:16px 16px 0 0;
    padding:8px 16px calc(16px + env(safe-area-inset-bottom));
    transform:translateY(105%); transition:transform .28s cubic-bezier(.2,.9,.25,1);
  }
  #msgSheet.open{transform:translateY(0)}
  @media (prefers-reduced-motion: reduce){#msgSheet{transition:none}}
  /* Toast (confirmation copie) */
  #toast{
    position:fixed; left:50%; bottom:max(90px, calc(90px + env(safe-area-inset-bottom)));
    transform:translate(-50%,10px); background:rgba(40,40,42,.95); color:#fff;
    font-size:13.5px; padding:9px 16px; border-radius:99px; z-index:60;
    opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;
  }
  #toast.on{opacity:1; transform:translate(-50%,0)}
  @media (prefers-reduced-motion: reduce){#toast{transition:none}}
  /* Cartes de validation (brouillons email, rendez-vous...) */
  .vcard{max-width:88%}
  .vc-resume{white-space:pre-wrap; font-size:15px; line-height:1.45; background:rgba(255,255,255,.07); border-radius:12px; padding:10px 12px; margin-bottom:10px; word-wrap:break-word}
  .vc-row{display:flex; gap:8px}
  .vc-ok,.vc-no{flex:1; font:inherit; font-size:16px; font-weight:600; padding:12px; border-radius:12px; border:none; cursor:pointer}
  .vc-ok{background:#30D158; color:#03240F}
  .vc-no{background:rgba(255,69,58,.15); color:#FF453A; border:0.5px solid rgba(255,69,58,.5)}
  .vc-ok:disabled,.vc-no:disabled{opacity:.45}
  .vc-edit{
    display:block; width:100%; font:inherit; font-size:14.5px; font-weight:600;
    padding:10px; border-radius:12px; margin-bottom:8px; cursor:pointer;
    background:none; border:0.5px solid var(--hairline); color:var(--muted);
  }
  .vc-edit:disabled{opacity:.4}
  a.vc-attach{
    display:flex; align-items:center; gap:8px; text-decoration:none;
    background:rgba(255,255,255,.07); border:0.5px solid var(--hairline);
    border-radius:12px; padding:9px 12px; margin-bottom:10px; cursor:pointer;
  }
  .vc-attach .vc-attach-ic{font-size:18px}
  .vc-attach .vc-attach-txt{flex:1; min-width:0}
  .vc-attach b{display:block; font-size:14.5px; color:var(--ink); font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .vc-attach span{display:block; font-size:12px; color:var(--muted); margin-top:1px}
  a.fbtn{display:block; text-decoration:none; align-self:flex-start; cursor:pointer}
  .fbtn b{display:block; font-size:15.5px; color:var(--ink); font-weight:600}
  .fbtn span{display:block; font-size:12.5px; color:var(--muted); margin-top:3px}
  /* ---------- Écran de lancement ---------- */
  #splash{
    position:fixed; inset:0; z-index:60; background:var(--bg);
    display:none; align-items:center; justify-content:center; flex-direction:column; gap:30px;
    transition:opacity .3s ease;
  }
  #splash.on{display:flex}
  html.boot #login{display:none}
  html.boot #splash{display:flex}
  #splash.done{opacity:0; pointer-events:none}
  .s-wrap{position:relative; width:118px; height:118px; animation:senter .6s cubic-bezier(.2,.9,.3,1.3) both}
  @keyframes senter{from{transform:scale(.55); opacity:0}to{transform:scale(1); opacity:1}}
  .s-ring{
    position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from 0deg, transparent 0 62%, rgba(232,185,106,.15) 72%, #E8B96A 88%, #F5D9A0 96%, transparent 100%);
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 3.5px), #fff calc(100% - 3px));
    mask:radial-gradient(farthest-side, transparent calc(100% - 3.5px), #fff calc(100% - 3px));
    animation:sring 1.15s linear infinite;
  }
  @keyframes sring{to{transform:rotate(360deg)}}
  .s-logo{
    position:absolute; inset:13px; border-radius:50%;
    background:linear-gradient(145deg,#E8B96A,#B87E2E); color:#1A130A;
    font-family:Georgia,serif; font-weight:800; font-size:46px;
    display:flex; align-items:center; justify-content:center;
    animation:sbreathe 2.2s ease-in-out infinite;
  }
  @keyframes sbreathe{0%,100%{box-shadow:0 0 22px rgba(232,185,106,.22)}50%{box-shadow:0 0 58px rgba(232,185,106,.55)}}
  #splash .s-name{color:var(--muted); font-size:13px; font-weight:700; letter-spacing:.34em; text-transform:uppercase; padding-left:.34em}
  @media (prefers-reduced-motion: reduce){
    .s-ring{animation:none; opacity:.4}
    .s-logo{animation:none}
    .s-wrap{animation:none}
  }

  /* ---- Appel vocal en direct (V2) ---- */
  #callbar{
    position:fixed; left:0; right:0; top:0; z-index:60;
    display:none; align-items:center; gap:10px;
    padding:calc(env(safe-area-inset-top) + 8px) 14px 10px;
    background:rgba(28,28,30,.92); -webkit-backdrop-filter:saturate(180%) blur(20px); backdrop-filter:saturate(180%) blur(20px);
    border-bottom:.5px solid var(--hairline);
  }
  #callbar.on{display:flex}
  .cb-dot{width:9px; height:9px; border-radius:50%; background:var(--ok); flex:none; animation:cbpulse 1.6s ease-in-out infinite}
  .cb-dot.wait{background:var(--gold-a)}
  @keyframes cbpulse{0%,100%{opacity:1}50%{opacity:.25}}
  .cb-txt{flex:1; min-width:0; font-size:14px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cb-txt small{display:block; font-size:11px; font-weight:400; color:var(--muted)}
  .cb-btn{
    flex:none; border:0; border-radius:999px; padding:8px 14px; font-size:13px; font-weight:700;
    color:#fff; background:rgba(120,120,128,.32); cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .cb-btn.hang{background:var(--no)}
  .cb-btn.muted{background:var(--gold-b)}
  @media (prefers-reduced-motion: reduce){ .cb-dot{animation:none} }
</style>
</head>
<body>

<div id="splash">
  <div class="s-wrap"><div class="s-ring"></div><div class="s-logo">J</div></div>
  <div class="s-name">Jarvis</div>
</div>

<div id="callbar">
  <span class="cb-dot wait" id="cb-dot"></span>
  <span class="cb-txt" id="cb-txt">Connexion…<small id="cb-sub">Jarvis arrive</small></span>
  <button class="cb-btn" id="cb-mute" type="button">Muet</button>
  <button class="cb-btn hang" id="cb-hang" type="button">Raccrocher</button>
</div>

<div id="login">
  <div class="biglogo">J</div>
  <h1>Jarvis</h1>
  <p>Votre assistant, disponible 24h/24.</p>
  <input id="codein" type="text" placeholder="Code d'accès" autocomplete="off" autocapitalize="none">
  <button id="loginbtn" type="button">Se connecter</button>
  <p id="loginerr"></p>
  <p class="hint">Une fois connecté : Partager → « Sur l'écran d'accueil ». Jarvis s'installe comme une vraie application, avec votre code retenu dans le raccourci.</p>
  <p class="hint" id="loginver" style="border:none; padding-top:0; margin-top:-8px"></p>
</div>

<div id="app">
  <header>
    <div class="mono-j">J</div>
    <b class="hname">Jarvis</b>
    <i class="dot"></i>
    <svg id="hchev" width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 8.5 12 15.5 19 8.5" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <button id="hcallbtn" type="button" aria-label="Appeler Jarvis">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.2 1.2.4 2.5.6 3.8.6.6 0 1 .5 1 1V20.5c0 .6-.4 1-1 1C11.5 21.5 2.5 12.5 2.5 1.7c0-.6.4-1 1-1H7c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.2 1.1L6.6 10.8Z"/></svg>
    </button>
  </header>
  <div id="pullspin"><span class="pullspin-ic"></span></div>
  <div id="chat"></div>
  <div id="composer">
    <button id="micbtn" type="button" aria-label="Message vocal">
      <svg width="18" height="22" viewBox="0 0 22 26" fill="currentColor"><rect x="7" y="1" width="8" height="14" rx="4"/><path d="M3 12a8 8 0 0 0 16 0M11 20v4M7 24.5h8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div id="recui"><span class="recdot"></span><canvas id="reccv"></canvas><span id="rectime2">0:00</span></div>
    <div id="prevui">
      <button id="pvx" type="button" aria-label="Annuler">✕</button>
      <div class="pill"><button id="pvplay" type="button" aria-label="Écouter">▶</button><canvas id="pvcv"></canvas><span id="pvtime">0:00</span></div>
      <button id="pvsend" type="button" aria-label="Envoyer le vocal"><svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path d="M10 17V5.5M10 3l-6 6.2M10 3l6 6.2" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <textarea id="textin" rows="1" placeholder="Écrire à Jarvis…"></textarea>
    <button id="sendbtn" class="idle" type="button" aria-label="Envoyer">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path d="M10 17V5.5M10 3l-6 6.2M10 3l6 6.2" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<div id="sheetbg"></div>
<div id="sheet">
  <div class="sh-handle"></div>
  <div class="sh-group">
    <button class="sh-item" type="button" disabled><span class="sh-ic">✉️</span><span class="sh-label">Emails à valider</span><span class="soon">bientôt</span></button>
    <button class="sh-item" id="sh-docs" type="button"><span class="sh-ic">📄</span><span class="sh-label">Mes documents</span></button>
    <button class="sh-item" id="sh-push" type="button"><span class="sh-ic">🔔</span><span class="sh-label">Notifications</span><span class="sw" id="sw-push"><span class="sw-knob"></span></span></button>
  </div>
  <div class="sh-group">
    <button class="sh-item danger" id="sh-logout" type="button"><span class="sh-ic">🚪</span><span class="sh-label">Se déconnecter</span></button>
  </div>
  <p class="sh-ver" id="subline">Jarvis</p>
</div>

<div id="docsview">
  <div id="docs-head">
    <button id="docs-back" type="button" aria-label="Retour" style="display:none">←</button>
    <b id="docs-title">📄 Mes documents</b>
    <button id="docs-close" type="button" aria-label="Fermer">✕</button>
  </div>
  <div id="docs-search-wrap">
    <input id="docs-search" type="search" inputmode="search" placeholder="🔍 Rechercher un document…" autocomplete="off" autocapitalize="off" autocorrect="off">
  </div>
  <div id="docs-list"></div>
</div>

<div id="msgSheetbg"></div>
<div id="msgSheet">
  <div class="sh-handle"></div>
  <button class="sh-item" id="msgCopy" type="button">📋&nbsp; Copier le texte</button>
  <button class="sh-item danger" id="msgDelete" type="button">🗑&nbsp; Supprimer</button>
  <button class="sh-item" id="msgCancel" type="button">Annuler</button>
</div>
<div id="toast"></div>

<script>
(function(){
  var APPV = 'v2.30';

  // ---- Mise à jour automatique (contourne le cache GitHub Pages) ----
  function checkUpdate(){
    fetch('./version.json?t=' + Date.now(), { cache:'no-store' })
      .then(function(r){ return r.json(); })
      .then(function(j){
        if (!j || !j.v || ('v' + j.v) === APPV) return;
        var tried = null;
        try { tried = sessionStorage.getItem('majTentee'); } catch(e){}
        if (tried === j.v) return; // déjà tenté (nouvelle version en cours de propagation)
        try { sessionStorage.setItem('majTentee', j.v); } catch(e){}
        location.replace(location.pathname + '?u=' + Date.now());
      }).catch(function(){});
  }
  checkUpdate();
  setInterval(checkUpdate, 60000);
  document.addEventListener('visibilitychange', function(){ if (!document.hidden) checkUpdate(); });
  var API = 'https://mat22.app.n8n.cloud/webhook/jarvis-msg';
  var login = document.getElementById('login');
  var app = document.getElementById('app');
  var chat = document.getElementById('chat');
  var codein = document.getElementById('codein');
  var loginbtn = document.getElementById('loginbtn');
  var loginerr = document.getElementById('loginerr');
  var textin = document.getElementById('textin');
  var sendbtn = document.getElementById('sendbtn');
  var micbtn = document.getElementById('micbtn');
  var subline = document.getElementById('subline');
  // Version affichée = TOUJOURS APPV (sert au diagnostic à distance : elle ne doit jamais mentir)
  var loginver = document.getElementById('loginver');
  if (loginver) loginver.textContent = APPV;

  // Clavier iOS : garder la conversation calée en bas (sans toucher a la hauteur du body)
  if (window.visualViewport){
    window.visualViewport.addEventListener('resize', function(){
      setTimeout(function(){ chat.scrollTop = chat.scrollHeight; }, 60);
    });
  }

  // Environnement : sandbox n8n ? (localStorage et micro bloqués)
  var sandboxed = false;
  try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); } catch(e){ sandboxed = true; }
  var micCapable = !sandboxed && !!(navigator.mediaDevices && window.MediaRecorder);
  if (micCapable) micbtn.classList.add('on');

  // Notifications push (app fermée) : clé publique VAPID, sans danger à exposer
  var VAPID_PUBLIC = 'BMPImK_GCyBR1RBz1SjLJM0TzLYJzAW6IaQFuB6Tdoj0aOsvIIXX4T2ShdfE_jUu4roapFLceY9Wr6jafR1SRR0';

  // Appel vocal en direct (Vapi) : clé PUBLIQUE, faite pour vivre dans la page (aucun droit d'admin)
  var VAPI_PUBLIC = '012e5669-0374-4b12-95a0-56a1a9f81bb2';
  var VAPI_ASSISTANT = '89f9d8c9-4bc4-46b2-b0b8-a901474ae2c3'; // « Jarvis Web (V2 vocal) »
  var VAPI_SDK = 'https://cdn.jsdelivr.net/npm/@vapi-ai/web@2.6.1/+esm';
  function urlB64ToUint8Array(b64){
    var pad = '='.repeat((4 - b64.length % 4) % 4);
    var base64 = (b64 + pad).replace(/-/g,'+').replace(/_/g,'/');
    var raw = atob(base64), arr = new Uint8Array(raw.length);
    for (var i=0;i<raw.length;i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }
  if ('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(function(){}); }

  // Signale au service worker qu'on regarde ACTIVEMENT la conversation, via IndexedDB
  // (partagee entre la page et le SW). ⚠️ Ne pas se fier a clients.matchAll() seul dans le SW :
  // sur iOS Safari, la visibilite/le focus des clients y est rapportee de facon peu fiable
  // (le SW tourne dans un contexte separe) -> d'ou des notifications sonores qui arrivaient
  // encore alors que l'app etait deja ouverte au premier plan.
  function pingVisible(){
    if (document.visibilityState !== 'visible') return;
    try {
      var open = indexedDB.open('jarvis', 1);
      open.onupgradeneeded = function(){ try { open.result.createObjectStore('kv'); } catch(e){} };
      open.onsuccess = function(){
        try {
          var tx = open.result.transaction('kv','readwrite');
          tx.objectStore('kv').put(Date.now(), 'lastVisibleAt');
        } catch(e){}
      };
    } catch(e){}
  }
  document.addEventListener('visibilitychange', pingVisible);
  window.addEventListener('focus', pingVisible);
  window.addEventListener('pageshow', pingVisible);
  pingVisible();
  setInterval(pingVisible, 4000);

  // Stockage résilient : le code vit dans l'ADRESSE (?c=..., conservé par le raccourci
  // iOS/Android) + localStorage quand il est disponible + mémoire de session.
  var mem = {};
  function urlCode(){
    try {
      var q = new URLSearchParams(location.search).get('c');
      if (q) return q;
    } catch(e){}
    var m = (location.hash || '').match(/[#&]c=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }
  function store(k, v){
    mem[k] = v;
    try { localStorage.setItem(k, v); } catch(e){}
    if (k === 'jarvisCode'){
      try {
        history.replaceState(null, '', v ? (location.pathname + '?c=' + encodeURIComponent(v)) : location.pathname);
      } catch(e){}
    }
  }
  function read(k){
    if (mem[k] !== undefined) return mem[k];
    try { var v = localStorage.getItem(k); if (v !== null) return v; } catch(e){}
    if (k === 'jarvisCode') return urlCode();
    return null;
  }

  function fmtTime(ts){
    var d = ts ? new Date(ts) : new Date();
    if (isNaN(d.getTime())) d = new Date();
    return d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  }
  function bubble(text, who, opts){
    opts = opts || {};
    var d = document.createElement('div');
    d.className = 'msg ' + who;
    var txt = document.createElement('span');
    txt.textContent = text;
    d.appendChild(txt);
    if (who === 'user' || who === 'jarvis'){
      d.dataset.rawtext = text;
      if (opts.id !== undefined && opts.id !== null) d.dataset.id = String(opts.id);
      var tm = document.createElement('span');
      tm.className = 'mtime';
      tm.textContent = fmtTime(opts.createdAt);
      d.appendChild(tm);
      bindLongPress(d);
    }
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }
  function typingOn(){
    var d = document.createElement('div');
    d.className = 'typing'; d.id = 'typing';
    d.innerHTML = '<i></i><i></i><i></i>';
    chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
  }
  function typingOff(){ var t = document.getElementById('typing'); if(t) t.remove(); }

  function post(payload, onOk, onErr){
    payload.code = String(read('jarvisCode') || '').trim();
    fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    }).then(function(r){ return r.json(); }).then(function(j){
      if (j && j.error){ onErr(j.error); } else { onOk(j || {}); }
    }).catch(function(){ onErr('Connexion impossible. Vérifiez le réseau et réessayez.'); });
  }

  function renderExtras(j){
    if (!j) return;
    if (j.validation && j.validation.kind){
      var card = document.createElement('div');
      card.className = 'msg jarvis vcard';
      var pre = document.createElement('div'); pre.className = 'vc-resume';
      pre.textContent = j.validation.resume || '';
      card.appendChild(pre);
      if (j.validation.fichier && j.validation.fichier.url){
        var att = document.createElement('a');
        att.className = 'vc-attach';
        att.href = 'https://mat22.app.n8n.cloud' + j.validation.fichier.url + '&code=' + encodeURIComponent(String(read('jarvisCode') || '').trim());
        att.target = '_blank'; att.rel = 'noopener';
        var ic = document.createElement('span'); ic.className = 'vc-attach-ic'; ic.textContent = '📎';
        var txt = document.createElement('span'); txt.className = 'vc-attach-txt';
        var nom = document.createElement('b'); nom.textContent = j.validation.fichier.nom || 'pièce jointe';
        var sp2 = document.createElement('span'); sp2.textContent = 'Touche pour vérifier le fichier avant de valider';
        txt.appendChild(nom); txt.appendChild(sp2);
        att.appendChild(ic); att.appendChild(txt);
        card.appendChild(att);
      }
      var edit = null;
      if (j.validation.kind === 'email' || j.validation.kind === 'emaildoc'){
        edit = document.createElement('button');
        edit.type = 'button'; edit.className = 'vc-edit'; edit.textContent = '✏️ Modifier';
        card.appendChild(edit);
      }
      var row = document.createElement('div'); row.className = 'vc-row';
      var ok = document.createElement('button'); ok.type = 'button'; ok.className = 'vc-ok'; ok.textContent = '✅ Valider';
      var no = document.createElement('button'); no.type = 'button'; no.className = 'vc-no'; no.textContent = '❌ Annuler';
      row.appendChild(ok); row.appendChild(no); card.appendChild(row);
      function act(choix){
        ok.disabled = no.disabled = true;
        if (edit) edit.disabled = true;
        post({ type:'action', kind: j.validation.kind, choix: choix }, function(r){
          row.remove();
          if (edit) edit.remove();
          bubble(r.reply || 'Fait.', 'jarvis');
        }, function(err){ ok.disabled = no.disabled = false; if (edit) edit.disabled = false; bubble(err, 'err'); });
      }
      ok.addEventListener('click', function(){ act('oui'); });
      no.addEventListener('click', function(){ act('non'); });
      if (edit) edit.addEventListener('click', function(){
        textin.focus();
        textin.scrollIntoView({ block:'nearest' });
      });
      chat.appendChild(card);
    }
    (j.fichiers || []).forEach(function(f){
      var a = document.createElement('a');
      a.className = 'msg jarvis fbtn';
      a.href = 'https://mat22.app.n8n.cloud' + f.url + '&code=' + encodeURIComponent(String(read('jarvisCode') || '').trim());
      a.target = '_blank'; a.rel = 'noopener';
      var b = document.createElement('b'); b.textContent = '📄 ' + (f.nom || 'document');
      a.appendChild(b);
      if (f.info){ var sp = document.createElement('span'); sp.textContent = f.info; a.appendChild(sp); }
      chat.appendChild(a);
    });
    chat.scrollTop = chat.scrollHeight;
  }

  function renderHistory(msgs, extras){
    chat.innerHTML = '';
    (msgs || []).forEach(function(m){
      if (!m || !m.contenu) return;
      bubble(String(m.contenu), m.role === 'user' ? 'user' : 'jarvis', { id: m.id, createdAt: m.createdAt });
    });
    if (!chat.children.length){
      bubble('Bonjour, je suis Jarvis. Je connais vos contacts, vos chantiers, vos devis et votre agenda — posez-moi une question.', 'jarvis');
    }
    // Re-affiche le brouillon en attente (email/rdv/archive) et les derniers fichiers trouves
    // s'il y en a — sinon ils disparaissaient a chaque rafraichissement/reouverture de l'app
    // (ils n'etaient jamais que dans la reponse LIVE, jamais reconstruits depuis le serveur).
    if (extras) renderExtras(extras);
  }

  // ---- Toast (petite confirmation, ex: "Copié") ----
  var toastEl = document.getElementById('toast');
  var toastTimer = null;
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('on');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('on'); }, 1600);
  }

  // ---- Feuille d'actions sur un message : copier / supprimer (appui long) ----
  var msgSheet = document.getElementById('msgSheet');
  var msgSheetbg = document.getElementById('msgSheetbg');
  var msgDeleteBtn = document.getElementById('msgDelete');
  var msgSheetTarget = null;
  function msgSheetOpen(o){ msgSheet.classList.toggle('open', o); msgSheetbg.classList.toggle('open', o); }
  function showMsgMenu(el){
    msgSheetTarget = el;
    msgDeleteBtn.style.display = el.dataset.id ? '' : 'none';
    msgSheetOpen(true);
  }
  msgSheetbg.addEventListener('click', function(){ msgSheetOpen(false); });
  document.getElementById('msgCancel').addEventListener('click', function(){ msgSheetOpen(false); });
  document.getElementById('msgCopy').addEventListener('click', function(){
    msgSheetOpen(false);
    if (!msgSheetTarget) return;
    var txt = msgSheetTarget.dataset.rawtext || msgSheetTarget.textContent || '';
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){ toast('Copié'); }).catch(function(){ toast('Copie impossible'); });
    } else { toast('Copie non prise en charge'); }
  });
  msgDeleteBtn.addEventListener('click', function(){
    msgSheetOpen(false);
    if (!msgSheetTarget || !msgSheetTarget.dataset.id) return;
    var el = msgSheetTarget;
    post({ type:'delete-message', id: el.dataset.id }, function(){ el.remove(); }, function(err){ bubble(err, 'err'); });
  });
  // ⚠️ Regression WebKit connue (iOS, cf. bug webkit #231161) : -webkit-user-select:none seul
  // ne suffit plus toujours a empecher la loupe/selection native sur un appui long — Safari peut
  // quand meme demarrer une selection de texte (surlignage bleu) en concurrence avec notre menu.
  // Parade fiable utilisee par la plupart des apps de messagerie web : on efface IMMEDIATEMENT
  // toute selection que Safari tente de creer, des qu'elle apparait (selectionchange), pour
  // qu'elle ne devienne jamais visible a l'ecran.
  document.addEventListener('selectionchange', function(){
    var s = window.getSelection();
    if (s && !s.isCollapsed) s.removeAllRanges();
  });
  function bindLongPress(el){
    var timer = null;
    var start = function(){ timer = setTimeout(function(){ showMsgMenu(el); }, 480); };
    var cancel = function(){ clearTimeout(timer); };
    el.addEventListener('touchstart', start, { passive:true });
    el.addEventListener('touchend', cancel);
    el.addEventListener('touchmove', cancel);
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', cancel);
    el.addEventListener('mouseleave', cancel);
    el.addEventListener('contextmenu', function(e){ e.preventDefault(); showMsgMenu(el); });
  }

  function enterApp(nom, msgs, extras){
    login.style.display = 'none';
    app.style.display = 'flex';
    subline.textContent = (nom ? ('Assistant de ' + nom + ' — en ligne') : 'en ligne') + ' · ' + APPV + ' · H' + window.innerHeight + '/' + ((screen && screen.height) || '?');
    renderHistory(msgs, extras);
  }

  // ---- Login ----
  loginbtn.addEventListener('click', function(){
    var code = codein.value.trim().toLowerCase();
    if (!code){ loginerr.textContent = 'Entrez votre code d’accès.'; return; }
    loginbtn.disabled = true; loginerr.textContent = '';
    store('jarvisCode', code);
    post({ type:'history' }, function(j){
      loginbtn.disabled = false;
      if (j.nom) store('jarvisNom', j.nom);
      try { localStorage.setItem('jarvisHist', JSON.stringify({ nom: j.nom, messages: j.messages })); } catch(e){}
      enterApp(j.nom, j.messages, j);
    }, function(err){
      loginbtn.disabled = false;
      store('jarvisCode','');
      loginerr.textContent = err;
    });
  });
  codein.addEventListener('keydown', function(e){ if (e.key === 'Enter') loginbtn.click(); });

  // ---- Texte ----
  function autosize(){
    textin.style.height = 'auto';
    textin.style.height = Math.min(textin.scrollHeight, 120) + 'px';
    sendbtn.classList.toggle('idle', !textin.value.trim());
  }
  textin.addEventListener('input', autosize);
  function sendText(){

    }
    swPush.classList.add('busy');
    try {
      if (pushCurrentSub){

        await pushCurrentSub.unsubscribe();
        pushCurrentSub = null;
        setSwOn(false);

          body: JSON.stringify({ type:'push-unsubscribe', code: String(read('jarvisCode')||'').trim(), endpoint: endpoint }) });

  // Le CDN emballe le module deux fois (default.default) : sans ce dépliage, « n'est pas un constructeur ».
  function loadVapi(){
    if (vapi) return Promise.resolve(vapi);
    if (vapiLoading) return vapiLoading;
    vapiLoading = import(VAPI_SDK).then(function(Mod){
      var Vapi = (Mod && Mod.default && Mod.default.default) || (Mod && Mod.default);
      if (typeof Vapi !== 'function') throw new Error('SDK vocal illisible');
      vapi = new Vapi(VAPI_PUBLIC);

    return vapiLoading;

  async function startVocalCall(){
    if (!navigator.mediaDevices || !window.isSecureContext){
      bubble('L’appel vocal a besoin du micro, indisponible sur ce navigateur.', 'err'); return;
    }
    if (callbar.classList.contains('on')) return; // déjà en ligne

    // L'identité voyage en metadata d'appel (Vapi la renvoie dans chaque webhook d'outil)
    // -> c'est ce qui permet à Jarvis de charger TA mémoire, pas celle de l'autre associé.
    var vocalCode = String(read('jarvisCode') || '').trim();
    if (!vocalCode){
      bubble('Reconnecte-toi avant d’appeler Jarvis.', 'err'); return;
    }

    // Le micro est demandé ICI, pas par le SDK : quand le SDK se voit refuser le micro,
    // il se contente d'un avertissement dans la console et réessaie en boucle
    // -> l'utilisateur resterait bloqué sur « Connexion… » sans jamais rien comprendre.
    try {
      var probe = await navigator.mediaDevices.getUserMedia({ audio: true });
      probe.getTracks().forEach(function(t){ t.stop(); });
    } catch(e){
      bubble('Jarvis n’a pas l’autorisation du micro. Autorise-le pour ce site, puis réessaie — en attendant, tu peux lui écrire ou utiliser la dictée du clavier.', 'err');
      return;
    }

    callShow(true);
    callState('Connexion…', 'Jarvis arrive', false);
    try {
      var v = await loadVapi();
      // Filet : si Jarvis n'a pas décroché au bout de 20 s, on ne laisse pas la barre tourner dans le vide.

      callWatch = setTimeout(function(){

        bubble('Jarvis n’a pas décroché. Vérifie ta connexion et réessaie.', 'err');
      }, 20000);
      await v.start(VAPI_ASSISTANT, { metadata: { code: vocalCode } });
    } catch(e){
      callStop();
      bubble('Impossible de démarrer l’appel : ' + String((e && (e.message || e.name)) || e), 'err');
    }
  }

  // ---- Voix : enregistrement façon iMessage (onde réelle, aperçu, envoi) ----
  var rec = null, chunks = [], recMime = '', recT0 = 0, recTimer = null, actx = null, raf = 0;

  function pickMime(){
    var c = ['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus'];
    for (var i=0;i<c.length;i++){ if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c[i])) return c[i]; }
    return '';
  }
  function fmtT(x){ x = Math.max(0, Math.round(x)); return Math.floor(x/60) + ':' + ('0' + (x % 60)).slice(-2); }
  function drawWave(cv, wave, progress, colPlayed, colRest){
    var w = cv.width = (cv.clientWidth || 160) * 2, h = cv.height = (cv.clientHeight || 30) * 2;
    var c = cv.getContext('2d'); c.clearRect(0, 0, w, h);
    var n = wave.length, bw = w / n;
    for (var i = 0; i < n; i++){
      var bh = Math.max(h * .14, wave[i] * h * .92);
      c.fillStyle = (i / n) <= progress ? colPlayed : colRest;
      var x = i * bw + bw * .3, y = (h - bh) / 2, ww = bw * .4;
      c.beginPath();
      if (c.roundRect) c.roundRect(x, y, ww, bh, ww / 2); else c.rect(x, y, ww, bh);
      c.fill();
    }
  }
  function lastN(arr, n){
    var out = [], start = arr.length - n;
    for (var i = 0; i < n; i++){ var v = arr[start + i]; out.push(v === undefined ? 0.06 : Math.max(.06, v)); }
    return out;
  }
  function condense(arr, n){
    if (!arr.length) return Array.apply(null, Array(n)).map(function(){ return .3; });
    var out = [], step = arr.length / n;
    for (var i = 0; i < n; i++){
      var a = Math.floor(i * step), b = Math.max(a + 1, Math.floor((i + 1) * step)), m = 0;
      for (var j = a; j < b && j < arr.length; j++) m = Math.max(m, arr[j]);
      out.push(m);
    }
    var mx = Math.max.apply(null, out) || 1;
    return out.map(function(v){ return Math.max(.12, v / mx); });
  }
  function startWave(stream){

      src.connect(an);

        raf = requestAnimationFrame(loop);
        an.getByteTimeDomainData(data);
        var sum = 0;
        for (var i = 0; i < data.length; i++){ var d = (data[i] - 128) / 128; sum += d * d; }
        var lvl = Math.min(1, Math.sqrt(sum / data.length) * 3.2);
        var now = performance.now();
        if (now - lastPush > 60){ levels.push(lvl); lastPush = now; }
        drawWave(reccv, lastN(levels, 44), 1, '#FF453A', '#FF453A');
      }
      loop();
    } catch(e){}

  function enterPreview(blob, dur){

    pvAudio.addEventListener('ended', function(){

  function voiceBubble(blob, dur, wave){

      var total = (audio.duration && isFinite(audio.duration)) ? audio.duration : dur;

  // ---- Rafraîchit la conversation depuis le serveur (corrige : notification cliquée → discussion pas à jour) ----
  var refreshing = false;
  function refreshFromServer(force, done){
    if (refreshing){ if (done) done(); return; }
    if (app.style.display !== 'flex'){ if (done) done(); return; }
    if (!String(read('jarvisCode') || '').trim()){ if (done) done(); return; }
    refreshing = true;
    post({ type:'history' }, function(j){
      refreshing = false;
      if (j.nom) store('jarvisNom', j.nom);
      var frais = JSON.stringify({ nom: j.nom, messages: j.messages });
      var prevCached = null;
      try { prevCached = localStorage.getItem('jarvisHist'); } catch(e){}
      if (frais !== prevCached || force){
        renderHistory(j.messages, j);
        try { localStorage.setItem('jarvisHist', frais); } catch(e){}
      }
      if (done) done();
    }, function(){ refreshing = false; if (done) done(); });
  }
  function onResume(){ pollInbox(); refreshFromServer(); }
  document.addEventListener('visibilitychange', function(){ if (!document.hidden) onResume(); });
  window.addEventListener('focus', onResume);
  window.addEventListener('pageshow', function(e){ if (e.persisted) onResume(); });

  // ---- Tire vers le haut = petite roue + recharge la conversation depuis le serveur ----
  // ⚠️ Le simple evenement 'scroll' s'est revele peu fiable sur iOS (momentum scroll,
  // evenements pas toujours emis a la bonne position) -> geste tactile direct a la place
  // (touchstart/touchmove/touchend), le meme principe que les listes "tirer pour rafraichir".
  var pullspin = document.getElementById('pullspin');
  var pullCooldown = false;
  var pullStartY = null;
  var pullArmed = false;
  chat.addEventListener('touchstart', function(e){
    if (pullCooldown) return;
    if (chat.scrollTop > 2) { pullStartY = null; return; }
    pullStartY = e.touches[0].clientY;
    pullArmed = false;
  }, { passive:true });
  chat.addEventListener('touchmove', function(e){
    if (pullStartY === null || pullCooldown) return;
    var dy = e.touches[0].clientY - pullStartY;
    if (chat.scrollTop <= 2 && dy > 28){
      pullArmed = true;
      // ⚠️ On NE touche PAS au DOM ici (pendant le geste actif) : iOS Safari peut geler le
      // rendu des changements JS tant qu'un scroll/toucher est en cours, rendant la roue
      // invisible malgre la classe bien posee. On l'affiche seulement au relachement du doigt
      // (touchend), quand le rendu n'est plus en concurrence avec le scroll natif.
    }
  }, { passive:true });
  function pullEnd(){
    pullStartY = null;
    if (!pullArmed) return;
    pullArmed = false;
    pullCooldown = true;
    pullspin.classList.add('on');
    toast('Actualisation…');
    var shownAt = Date.now();
    refreshFromServer(true, function(){
      // Reste visible au moins 900 ms (sinon un rechargement rapide fait clignoter la roue
      // trop vite pour etre remarquee).
      var reste = 900 - (Date.now() - shownAt);
      setTimeout(function(){
        pullspin.classList.remove('on');
        setTimeout(function(){ pullCooldown = false; }, 1200);
      }, Math.max(0, reste));
    });
  }
  chat.addEventListener('touchend', pullEnd, { passive:true });
  chat.addEventListener('touchcancel', pullEnd, { passive:true });

  // ---- Démarrage INSTANTANÉ : cache local d'abord, serveur en arrière-plan ----
  var splash = document.getElementById('splash');
  function splashOff(){
    splash.classList.add('done');
    setTimeout(function(){
      document.documentElement.classList.remove('boot');
      splash.classList.remove('on','done');
      splash.style.display = 'none';
    }, 320);
  }
  var savedCode = String(read('jarvisCode') || '').trim();
  if (savedCode){
    store('jarvisCode', savedCode);
    var cached = null;
    try { cached = JSON.parse(localStorage.getItem('jarvisHist') || 'null'); } catch(e){}
    if (cached && cached.messages && cached.messages.length){
      // Ouverture immédiate sur la dernière conversation connue (0 attente)
      enterApp(cached.nom || read('jarvisNom'), cached.messages);
      splashOff();
    } else {
      splash.classList.add('on');
    }
    post({ type:'history' }, function(j){
      if (j.nom) store('jarvisNom', j.nom);
      var frais = JSON.stringify({ nom: j.nom, messages: j.messages });
      if (!cached || frais !== JSON.stringify(cached)){
        enterApp(j.nom || read('jarvisNom'), j.messages, j);
      } else {
        renderExtras(j);
      }
      try { localStorage.setItem('jarvisHist', frais); } catch(e){}
      splashOff();
    }, function(){
      // code périmé ou réseau coupé : sans cache, retour à l'écran de connexion
      if (!(cached && cached.messages && cached.messages.length)){
        splash.classList.remove('on');
        document.documentElement.classList.remove('boot');
        splash.style.display = 'none';
        login.style.display = 'flex';
      }
    });
  }
})();
</script>
</body>
</html>
